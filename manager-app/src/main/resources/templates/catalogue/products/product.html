<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title data-th-text="${product.title} + ' &ndash; Рецептотека'">Рецепт &ndash; Рецептотека</title>
    <link rel="stylesheet" data-th-href="@{/styles.css}">
</head>
<body>
<nav class="navbar">
    <div class="nav-links">
        <a data-th-href="@{/catalogue/products/list}" class="active">Список рецептов</a>
        <a data-th-href="@{/catalogue/products/create}">+ Создать рецепт</a>
    </div>
</nav>

<div class="main-content recipe-detail-container">
    <a data-th-href="@{/catalogue/products/list}" class="back-link">&larr; К списку рецептов</a>
    
    <div class="recipe-detail-header">
        <h1 class="recipe-detail-title" data-th-text="${product.title}"></h1>
        <p class="recipe-detail-description" data-th-text="${product.details}"></p>
        <div class="action-buttons">
            <a data-th-href="@{/catalogue/products/{productId}/edit(productId=${product.id})}" class="action-button edit-button">Изменить</a>
            <form method="post" data-th-action="@{/catalogue/products/{productId}/delete(productId=${product.id})}" style="display: inline;">
                <button type="submit" class="action-button delete-button">Удалить</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
