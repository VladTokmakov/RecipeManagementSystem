<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title data-th-text="'Редактирование рецепта &laquo;' + ${product.title} + '&raquo; &ndash; Рецептотека'">Редактирование рецепта &ndash; Рецептотека</title>
    <link rel="stylesheet" data-th-href="@{/styles.css}">
</head>
<body>
<nav class="navbar">
    <div class="nav-links">
        <a data-th-href="@{/catalogue/products/list}">Список рецептов</a>
        <a data-th-href="@{/catalogue/products/create}">+ Создать рецепт</a>
    </div>
</nav>

<div class="main-content recipe-detail-container">
    <a data-th-href="@{/catalogue/products/{productId}(productId=${product.id})}" class="back-link">&larr; К рецепту</a>
    
    <div class="recipe-detail-header">
        <h1 class="recipe-detail-title" data-th-text="'Редактирование рецепта &laquo;' + ${product.title} + '&raquo;'"></h1>
        
        <div data-th-if="${errors}" class="error-section">
            <ul class="error-list">
                <li data-th-each="error: ${errors}" data-th-text="${error}"></li>
            </ul>
        </div>
        
        <form method="post" data-th-action="@{/catalogue/products/{productId}/edit(productId=${product.id})}">
            <div class="form-group">
                <label class="form-label">Название:</label>
                <input type="text" name="title" data-th-value="${payload != null ? payload.title : product.title}" class="form-control">
            </div>
            <div class="form-group">
                <label class="form-label">Описание:</label>
                <textarea name="details" data-th-text="${payload != null ? payload.details : product.details}" class="review-textarea"></textarea>
            </div>
            <button type="submit" class="btn-primary">Изменить</button>
        </form>
    </div>
</div>
</body>
</html>
