<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Избранные рецепты &ndash; Рецептотека</title>
    <link rel="stylesheet" data-th-href="@{/styles.css}">
</head>
<body>
<nav class="navbar">
    <div class="nav-links">
        <a data-th-href="@{/customer/products/list}">Рецепты</a>
        <a data-th-href="@{/customer/products/favourites}" class="active">Избранное</a>
    </div>
</nav>

<div class="header-section">
    <div class="logo-section">
        <div class="logo-icon">🌳</div>
        <div class="logo-text">Рецептотека</div>
    </div>
</div>

<div class="search-section">
    <form method="get" data-th-action="@{/customer/products/favourites}" class="search-form">
        <input type="text" name="filter" data-th-value="${filter}" placeholder="Поиск рецептов" class="search-input">
        <input type="text" name="detailsFilter" data-th-value="${detailsFilter}" placeholder="Фильтр" class="filter-input">
        <button type="submit" class="search-button">Поиск</button>
    </form>
</div>

<div class="main-content">
    <h1 class="page-title">Избранные рецепты</h1>
    <div class="recipe-list">
        <a data-th-href="@{/customer/products/{productId}(productId=${product.id})}" 
           class="recipe-card" 
           data-th-each="product : ${products}"
           style="text-decoration: none; color: inherit;">
            <div class="recipe-card-header">
                <div class="recipe-icon">🍲</div>
                <div class="recipe-title" data-th-text="${product.title}"></div>
            </div>
            <div class="recipe-details" data-th-text="${product.details}"></div>
        </a>
    </div>
    
    <div class="pagination" data-th-if="${totalPages > 1}">
        <span class="pagination-info">
            Страница <span data-th-text="${currentPage + 1}"></span> из <span data-th-text="${totalPages}"></span>
            (всего <span data-th-text="${totalElements}"></span> рецептов)
        </span>
        <div class="pagination-controls">
            <a data-th-href="@{/customer/products/favourites(filter=${filter}, detailsFilter=${detailsFilter}, page=${currentPage - 1}, size=${pageSize})}" 
               class="pagination-link"
               data-th-if="${currentPage > 0}"
               style="text-decoration: none;">&larr; Назад</a>
            
            <span class="pagination-pages">
                <a data-th-each="i : ${#numbers.sequence(0, totalPages - 1)}"
                   data-th-href="@{/customer/products/favourites(filter=${filter}, detailsFilter=${detailsFilter}, page=${i}, size=${pageSize})}"
                   data-th-classappend="${i == currentPage} ? 'active' : ''"
                   class="pagination-link"
                   style="text-decoration: none;"
                   data-th-text="${i + 1}"></a>
            </span>
            
            <a data-th-href="@{/customer/products/favourites(filter=${filter}, detailsFilter=${detailsFilter}, page=${currentPage + 1}, size=${pageSize})}" 
               class="pagination-link"
               data-th-if="${currentPage < totalPages - 1}"
               style="text-decoration: none;">Вперед &rarr;</a>
        </div>
    </div>
</div>
</body>
</html>
