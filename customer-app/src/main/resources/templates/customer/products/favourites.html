<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Избранные рецепты &ndash; Рецептотека</title>
    <link rel="stylesheet" data-th-href="@{/styles.css}">
</head>
<body>
<nav class="navbar">
    <div class="nav-links">
        <a data-th-href="@{/customer/products/list}">Рецепты</a>
        <a data-th-href="@{/customer/products/favourites}" class="active">Избранное</a>
    </div>
</nav>

<div class="header-section">
    <div class="logo-section">
        <div class="logo-icon">🌳</div>
        <div class="logo-text">Рецептотека</div>
    </div>
</div>

<div class="search-section">
    <form method="get" data-th-action="@{/customer/products/favourites}" class="search-form">
        <input type="text" name="filter" data-th-value="${filter}" placeholder="Поиск рецептов" class="search-input">
        <input type="text" name="detailsFilter" data-th-value="${detailsFilter}" placeholder="Фильтр" class="filter-input">
        <button type="submit" class="search-button">Поиск</button>
    </form>
</div>

<div class="main-content">
    <h1 class="page-title">Избранные рецепты</h1>
    <div class="recipe-list">
        <a data-th-href="@{/customer/products/{productId}(productId=${product.id})}" 
           class="recipe-card" 
           data-th-each="product : ${products}"
           style="text-decoration: none; color: inherit;">
            <div class="recipe-card-header">
                <div class="recipe-icon">🍲</div>
                <div class="recipe-title" data-th-text="${product.title}"></div>
            </div>
            <div class="recipe-details" data-th-text="${product.details}"></div>
        </a>
    </div>
</div>
</body>
</html>
